hooks:
  - name: vod-on-error
    event: on_tool_result
    condition:
      - field: result.success
        operator: eq
        value: false
    action: activate_skill
    skill: huawei-cloud-vod-collector
    priority: high

  - name: vod-on-prompt
    event: on_prompt
    condition:
      - field: prompt.text
        operator: matches_any
        value_from_config: rejection.rejection_keywords
    action: activate_skill
    skill: huawei-cloud-vod-collector
    priority: normal

  - name: vod-on-user-report
    event: on_prompt
    condition:
      - field: prompt.text
        operator: matches_any
        value_from_config: report.trigger_keywords
    action: activate_skill
    skill: huawei-cloud-vod-collector
    priority: high